<section class="py-24 bg-[#07130d]">

  <div class="max-w-7xl mx-auto px-5 sm:px-6 lg:px-12">

    <!-- Section Header -->
    <div class="text-center mb-16">

      <span
        class="text-[#00ff66] uppercase tracking-widest text-sm font-semibold">

        Our Projects

      </span>

      <h2
        class="text-white text-4xl md:text-5xl font-bold mt-4">

        Successful Projects We've Delivered

      </h2>

      <p
        class="text-gray-400 max-w-3xl mx-auto mt-6">

        Explore some of our successful solutions in RFID systems,
        software development, automation, and digital transformation.

      </p>

    </div>

    <!-- Swiper -->
    <swiper-container
      #swiperRef
      loop="false"
      autoplay-delay="4000"
      autoplay-disable-on-interaction="false"
      navigation="false"
      pagination="false"
      space-between="30"
      slides-per-view="1"
      breakpoints='{
        "640": {
          "slidesPerView": 1
        },
        "768": {
          "slidesPerView": 2
        },
        "1024": {
          "slidesPerView": 3
        }
      }'>

      <swiper-slide *ngFor="let project of projects">

        <div
          class="group
                 bg-[#101b15]
                 border border-[#163523]
                 rounded-3xl
                 overflow-hidden
                 h-full
                 hover:border-[#00ff66]
                 transition-all duration-500">

          <!-- Image -->
          <div class="overflow-hidden relative">

            <img
              [src]="project.image"
              [alt]="project.title"
              class="w-full h-64 object-cover
                     group-hover:scale-105
                     transition-transform duration-700">

            <span
              class="absolute top-4 left-4
                     bg-[#00cc52]
                     text-white
                     text-xs
                     font-semibold
                     px-3 py-1
                     rounded-full">

              {{ project.category }}

            </span>

          </div>

          <!-- Content -->
          <div class="p-6">

            <div class="flex justify-between items-center mb-4 gap-4">

              <h3
                class="text-white text-xl font-semibold">

                {{ project.title }}

              </h3>

              <span
                class="text-[#00ff66]
                       text-sm
                       font-medium">

                {{ project.status }}

              </span>

            </div>

            <p
              class="text-gray-400">

              {{ project.shortDescription }}

            </p>

          </div>

        </div>

      </swiper-slide>

    </swiper-container>

    <!-- Custom Arrows -->
    <div class="flex justify-center gap-4 mt-10">

      <button
        class="custom-prev"
        (click)="prevSlide()">

        ←

      </button>

      <button
        class="custom-next"
        (click)="nextSlide()">

        →

      </button>

    </div>

    <!-- View All -->
    <div class="flex justify-center mt-14">

      <a
        routerLink="/projects"
        class="px-8 py-4
               rounded-full
               bg-[#00cc52]
               text-white
               font-semibold
               hover:bg-[#00e65c]
               hover:scale-105
               transition-all duration-300">

        View All Projects

      </a>

    </div>

  </div>

</section>

<div class="mx-auto">

  <div class="relative">

    <div class="h-px bg-[#163523]"></div>

    <div
      class="absolute left-1/2 -translate-x-1/2 -top-1
             w-3 h-3 rounded-full
             bg-[#00ff66]
             shadow-[0_0_15px_#00ff66]">
    </div>

  </div>

</div>
