<section class="py-20 bg-[#07130d]">
  <div class="max-w-7xl mx-auto px-5 sm:px-6 lg:px-12">

    <div class="text-center mb-16">

      <span class="text-[#00ff66] uppercase tracking-widest text-sm font-semibold">
        Our Services
      </span>

      <h2 class="text-white text-4xl md:text-5xl font-bold mt-4">
        What We Provide
      </h2>

      <p class="text-gray-400 max-w-2xl mx-auto mt-6">
        We deliver innovative technology solutions that help businesses
        improve efficiency, security and digital transformation.
      </p>

    </div>

    <swiper-container #swiperRef loop="false" autoplay-delay="4000" autoplay-disable-on-interaction="false"
      navigation="false" pagination="false" space-between="30" slides-per-view="1" breakpoints='{
    "640": { "slidesPerView": 1 },
    "768": { "slidesPerView": 2 },
    "1024": { "slidesPerView": 3 }
    }'>

      <swiper-slide *ngFor="let service of services">

        <div class="service-card
                 group
                 bg-[#101b15]
                 border border-[#163523]
                 rounded-3xl
                 overflow-hidden
                 h-full
                 transition-all duration-500">

          <div class="overflow-hidden">

            <img [src]="service.image" [alt]="service.title" class="w-full h-60 object-cover
                     group-hover:scale-105
                     transition-transform duration-700">

          </div>

          <div class="p-6 flex flex-col h-[250px]">

            <h3 class="text-white text-2xl font-semibold mb-3">
              {{ service.title }}
            </h3>

            <p class="text-gray-400 flex-grow">
              {{ service.shortDescription }}
            </p>

            <a routerLink="/services" class="inline-flex items-center gap-2
                     text-[#00ff66]
                     font-medium
                     hover:gap-3
                     transition-all duration-300 mt-5">

              Learn More
              <span>→</span>

            </a>

          </div>

        </div>

      </swiper-slide>

    </swiper-container>

    <div class="flex justify-center gap-4 mt-10">

      <button class="custom-prev" (click)="prevSlide()">

        ←

      </button>

      <button class="custom-next" (click)="nextSlide()">

        →

      </button>

    </div>

    <div class="flex justify-center mt-14">

      <a routerLink="/services" class="px-8 py-4
               rounded-full
               bg-[#00cc52]
               text-white
               font-semibold
               hover:bg-[#00e65c]
               hover:scale-105
               transition-all duration-300">

        View All Services

      </a>

    </div>

  </div>

</section>

<div class="mx-auto">

  <div class="relative">

    <div class="h-px bg-[#163523]"></div>

    <div class="absolute left-1/2 -translate-x-1/2 -top-1
                w-3 h-3 rounded-full
                bg-[#00ff66]
                shadow-[0_0_15px_#00ff66]">
    </div>

  </div>

</div>
