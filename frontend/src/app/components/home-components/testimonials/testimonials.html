<section class="py-20 bg-[#07130d]">
  <div class="max-w-7xl mx-auto px-5 sm:px-6 lg:px-12">
    <!-- Header -->

    <div class="text-center mb-16">
      <span class="text-[#00ff66] uppercase tracking-widest text-sm font-semibold">
        Clients Testimonials
      </span>

      <h2 class="text-white text-4xl md:text-5xl font-bold mt-4">What Our Clients Say</h2>

      <p class="text-gray-400 max-w-2xl mx-auto mt-6">
        Read the reviews from many of our happy clients and partners.
      </p>
    </div>

    <swiper-container
      #swiperRef
      init="false"
      loop="true"
      space-between="30"
      slides-per-view="1"
      breakpoints='{

"640": {

"slidesPerView": 1

},


"768": {

"slidesPerView": 2

},


"1024": {

"slidesPerView": 3

}

}'
    >
      <swiper-slide *ngFor="let item of testimonials">
        <div
          class="testimonial-card group bg-[#101b15] border border-[#163523] rounded-3xl p-8 h-[360px] transition-all duration-500 flex flex-col"
        >
          <div
            class="w-14 h-14 min-w-14 min-h-14 rounded-full bg-[#00ff66] text-[#07130d] flex items-center justify-center text-2xl font-bold mb-6"
          >
            {{ item.company.charAt(0) }}
          </div>

          <h3 class="text-white text-2xl font-semibold mb-4">
            {{ item.company }}
          </h3>

          <p class="text-gray-400 leading-7 line-clamp-6">
            {{ item.message }}
          </p>

          <div class="mt-auto pt-6">
            <div class="h-1 w-14 bg-[#00ff66] rounded-full"></div>
          </div>
        </div>
      </swiper-slide>
    </swiper-container>
  </div>
</section>

<!-- Divider -->

<div class="mx-auto">
  <div class="relative">
    <div class="h-px bg-[#163523]"></div>

    <div
      class="absolute left-1/2 -translate-x-1/2 -top-1 w-3 h-3 rounded-full bg-[#00ff66] shadow-[0_0_15px_#00ff66]"
    ></div>
  </div>
</div>
