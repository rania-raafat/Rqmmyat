<section
  class="relative min-h-screen flex items-center overflow-hidden pt-32 sm:pt-36 lg:pt-40 pb-24 lg:pb-32"
>
  <!-- Background Image -->
  <div class="absolute inset-0">
    <img
      src="images/projects-hero.jpeg"
      alt="Projects"
      class="w-full h-full object-cover hero-bg"
    />
  </div>

  <!-- Main Overlay -->
  <div
    class="absolute inset-0 bg-gradient-to-r from-[#07130d]/95 via-[#07130d]/85 to-[#07130d]/60"
  ></div>

  <!-- Extra Dark Overlay -->
  <div
    class="absolute inset-0 bg-gradient-to-t from-[#07130d] via-transparent to-[#07130d]/40"
  ></div>

  <!-- Glow Effects -->
  <div
    class="absolute top-0 right-0 w-[500px] h-[500px] bg-[#00ff66]/10 rounded-full blur-[180px]"
  ></div>

  <div
    class="absolute bottom-0 left-0 w-[350px] h-[350px] bg-[#00ff66]/10 rounded-full blur-[150px]"
  ></div>

  <!-- Content -->
  <div class="relative z-10 max-w-7xl mx-auto px-5 sm:px-6 lg:px-12 w-full">
    <div class="max-w-3xl">
      <span
        class="inline-flex items-center px-5 py-2 rounded-full border border-[#00ff66]/30 bg-[#00ff66]/5 backdrop-blur-xl text-[#00ff66] text-xs sm:text-sm tracking-[4px]"
      >
        OUR PROJECTS
      </span>

      <h1
        class="mt-8 text-white font-bold leading-[1.05] text-4xl sm:text-5xl md:text-6xl xl:text-7xl"
      >
        Turning Ideas Into

        <span class="block text-[#00ff66] mt-2"> Successful Digital Solutions </span>
      </h1>

      <p class="mt-8 text-gray-300 text-base sm:text-lg md:text-xl leading-8 max-w-2xl">
        Explore our portfolio of RFID systems, enterprise software, automation solutions, digital
        transformation initiatives, and innovative technology projects delivered for organizations
        across multiple industries.
      </p>

      <!-- Single CTA -->
      <div class="mt-10">
        <a
          routerLink="/contact"
          class="inline-flex items-center gap-3 bg-[#00ff66] text-black font-semibold px-8 py-4 rounded-full transition-all duration-500 hover:scale-105 hover:shadow-[0_0_30px_rgba(0,255,102,0.35)]"
        >
          Start Your Project

          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-5 h-5"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M9 5l7 7-7 7"
            />
          </svg>
        </a>
      </div>
    </div>
  </div>
</section>

<div class="mx-auto">
  <div class="relative">
    <div class="h-px bg-[#163523]"></div>

    <div
      class="absolute left-1/2 -translate-x-1/2 -top-1 w-3 h-3 rounded-full bg-[#00ff66] shadow-[0_0_15px_#00ff66]"
    ></div>
  </div>
</div>
