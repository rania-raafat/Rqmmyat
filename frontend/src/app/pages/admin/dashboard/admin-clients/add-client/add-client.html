<div class="add-client-page mt-2">
  <div class="page-header">
    <h2>Add New Client</h2>

    <p>Add a new client logo to your portfolio.</p>
  </div>

  <form [formGroup]="clientForm">
    <div class="client-layout">
      <!-- DETAILS -->

      <div class="client-card">
        <h3>Client Details</h3>

        <div class="form-group">
          <label> Client Name * </label>

          <input type="text" formControlName="name" placeholder="Client name" />
        </div>

        <div class="form-group">
          <label> Feature </label>

          <div class="checkbox-group">
            <input type="checkbox" id="featured" formControlName="featured" />

            <label for="featured" class="mb-0"> Featured Client </label>
          </div>
        </div>
      </div>

      <!-- LOGO -->

      <div class="client-card image-card">
        <h3>Client Logo</h3>

        <div class="image-preview">
          <img *ngIf="imagePreview" [src]="imagePreview" />

          <div *ngIf="!imagePreview" class="empty-preview">
            <i class="fa-regular fa-image"></i>
          </div>
        </div>

        <label class="upload-btn">
          <input hidden type="file" accept="image/*" (change)="onImageSelect($event)" />

          <i class="fa-solid fa-cloud-arrow-up"></i>

          Upload Logo
        </label>
      </div>
    </div>
  </form>

  <div class="actions">
    <button type="button" class="cancel-btn" (click)="cancel()">Cancel</button>

    <button type="button" class="save-btn" [disabled]="loading" (click)="saveClient()">
      <i class="fa-solid fa-floppy-disk"></i>

      {{ loading ? 'Saving...' : 'Save Client' }}
    </button>
  </div>
</div>
