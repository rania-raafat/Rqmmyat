<div class="projects-page mt-2">

  <div class="page-header">

    <h2>Projects</h2>

    <button
      class="add-btn"
      routerLink="/dashboard/projects/add">

      <i class="fa-solid fa-plus"></i>
      Add Project

    </button>

  </div>

  <div
    *ngIf="loading"
    class="loading">

    Loading...

  </div>

  <div
    *ngIf="!loading"
    class="table-wrapper">

    <table>

      <thead>

        <tr>

          <th>Image</th>

          <th>Title</th>

          <th>Category</th>

          <th>Status</th>

          <th>Featured</th>

          <th>Actions</th>

        </tr>

      </thead>

      <tbody>

        <tr *ngFor="let project of projects">

          <td>

            <img
              [src]="project.image"
              [alt]="project.title">

          </td>

          <td>

            {{ project.title }}

          </td>

          <td>

            {{ project.category }}

          </td>

          <td>

            <span class="status-badge">

              {{ project.status }}

            </span>

          </td>

          <td>

            <span
              *ngIf="project.featured"
              class="featured-badge">

              Featured

            </span>

            <span
              *ngIf="!project.featured"
              class="not-featured-badge">

              No

            </span>

          </td>

          <td>

            <button
              class="edit-btn"
              [routerLink]="[
                '/dashboard/projects/edit',
                project._id
              ]">

              Edit

            </button>

            <button
              *ngIf="isAdmin"
              class="delete-btn"
              (click)="openDeleteModal(project._id!)">

              Delete

            </button>

          </td>

        </tr>

      </tbody>

    </table>

  </div>

</div>

<!-- Delete Modal -->

<div
  class="modal-overlay"
  *ngIf="showDeleteModal">

  <div class="delete-modal">

    <div class="modal-icon">

      <i class="fa-solid fa-trash"></i>

    </div>

    <h3>Delete Project?</h3>

    <p>

      This action cannot be undone.

    </p>

    <div class="modal-actions">

      <button
        class="cancel-btn"
        (click)="closeDeleteModal()">

        Cancel

      </button>

      <button
        class="confirm-btn"
        (click)="confirmDelete()">

        Delete

      </button>

    </div>

  </div>

</div>
