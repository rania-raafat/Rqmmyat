<div class="edit-service-page">

  <div class="form-card">

    <div class="card-header">

      <h2>Edit Service</h2>

      <p>Update service information and image</p>

    </div>

    <form [formGroup]="serviceForm">

      <!-- TOP SECTION -->

      <div class="form-grid">

        <!-- IMAGE -->

        <div class="right-side">

          <label class="image-label">

            Service Image

          </label>

          <div class="image-box">

            <img *ngIf="imagePreview" [src]="imagePreview">

            <div *ngIf="!imagePreview" class="empty-image">

              <i class="fa-solid fa-image"></i>

              <span>No Image Selected</span>

            </div>

          </div>

          <label class="upload-btn">

            Change Image

            <input hidden type="file" accept="image/*" (change)="onImageSelect($event)">

          </label>

        </div>

        <!-- DETAILS -->

        <div class="left-side">

          <div class="form-group">

            <label>Service Title</label>

            <input type="text" formControlName="title">

          </div>

          <div class="form-group">

            <label>Short Description</label>

            <textarea rows="4" formControlName="shortDescription">
            </textarea>

          </div>

          <div class="form-group">

            <label>Description</label>

            <textarea rows="8" formControlName="description">
            </textarea>

          </div>

        </div>

      </div>

      <!-- SUB SERVICES CARD -->

      <!-- SUB SERVICES -->

      <div class="subservices-card">

        <div class="section-header">

          <div>
            <h3>Sub Services</h3>
            <p>Add service sections and their features</p>
          </div>

          <button type="button" class="add-sub-btn" (click)="addSubService()">

            <i class="fa-solid fa-plus"></i>
            Add Sub Service

          </button>

        </div>

        <div formArrayName="subServices">

          <div *ngFor="let sub of subServices.controls; let i = index" [formGroupName]="i" class="sub-card">

            <div class="sub-card-header">

              <div class="sub-title">

                <span class="sub-badge">
                  #{{ i + 1 }}
                </span>

                <h4>
                  {{ sub.get('title')?.value || 'New Sub Service' }}
                </h4>

              </div>

              <button type="button" class="delete-sub-btn" (click)="removeSubService(i)">

                <i class="fa-solid fa-trash"></i>

              </button>

            </div>

            <div class="form-group">

              <label>Sub Service Title</label>

              <input type="text" formControlName="title" placeholder="Enter sub service title">

            </div>

            <div class="form-group">

              <label>Description</label>

              <textarea rows="3" formControlName="description" placeholder="Enter description">
        </textarea>

            </div>

            <div class="features-section">

              <div class="features-header">

                <label>Features</label>

                <button type="button" class="add-feature-btn" (click)="addFeature(i)">

                  + Feature

                </button>

              </div>

              <div formArrayName="features">

                <div *ngFor="let feature of getFeatures(i).controls; let f = index" class="feature-row">

                  <input [formControlName]="f" placeholder="Feature name">

                  <button type="button" class="remove-feature-btn" (click)="removeFeature(i,f)">

                    ✕

                  </button>

                </div>

              </div>

            </div>

          </div>

        </div>

      </div>

      <!-- ACTIONS -->

      <div class="actions">

        <button type="button" class="cancel-btn" (click)="cancel()">

          Cancel

        </button>

        <button type="button" class="save-btn" [disabled]="loading" (click)="saveService()">

          {{ loading ? 'Updating...' : 'Update Service' }}

        </button>

      </div>

    </form>

  </div>

</div>
