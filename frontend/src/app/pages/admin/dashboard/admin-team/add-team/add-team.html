<div class="add-team-page mt-2">
  <div class="page-header">
    <h2>Add New Team Member</h2>

    <p>Create and publish a new team member profile.</p>
  </div>

  <form [formGroup]="teamForm">
    <div class="team-layout">
      <!-- DETAILS -->

      <div class="team-card">
        <h3>Team Member Details</h3>

        <div class="form-group">
          <label> Name * </label>

          <input type="text" formControlName="name" placeholder="Member name" />
        </div>

        <div class="form-group">
          <label> Position * </label>

          <input
            type="text"
            formControlName="position"
            placeholder="Frontend Developer, UI Designer"
          />
        </div>

        <div class="form-group">
          <label> Quote </label>

          <textarea rows="6" formControlName="quote" placeholder="Short member quote"> </textarea>
        </div>
      </div>

      <!-- IMAGE -->

      <div class="team-card image-card">
        <h3>Image</h3>

        <div class="image-preview">
          <img *ngIf="imagePreview" [src]="imagePreview" />

          <div *ngIf="!imagePreview" class="empty-preview">
            <i class="fa-regular fa-user"></i>
          </div>
        </div>

        <label class="upload-btn">
          <input hidden type="file" accept="image/*" (change)="onImageSelect($event)" />

          <i class="fa-solid fa-cloud-arrow-up"></i>

          Upload Image
        </label>
      </div>
    </div>
  </form>

  <div class="actions">
    <button type="button" class="cancel-btn" (click)="cancel()">Cancel</button>

    <button type="button" class="save-btn" [disabled]="loading" (click)="saveTeam()">
      <i class="fa-solid fa-floppy-disk"></i>

      {{ loading ? 'Saving...' : 'Save Team Member' }}
    </button>
  </div>
</div>
