<section class="py-24 bg-[#07130d]">
  <div class="max-w-7xl mx-auto px-5 sm:px-6 lg:px-12">
    <div class="text-center mb-16">
      <span class="text-[#00ff66] uppercase tracking-widest text-sm font-semibold">
        Our Clients
      </span>

      <h2 class="text-white text-4xl md:text-5xl font-bold mt-4">
        Trusted By Leading Organizations
      </h2>

      <p class="text-gray-400 max-w-3xl mx-auto mt-6">
        We proudly work with industry leaders across banking, hospitality, real estate, retail, and
        enterprise sectors.
      </p>
    </div>

    <swiper-container
      autoplay-delay="2500"
      autoplay-disable-on-interaction="false"
      loop="true"
      navigation="false"
      pagination="false"
      space-between="40"
      breakpoints='{
    "320": {
      "slidesPerView": 2
    },
    "640": {
      "slidesPerView": 3
    },
    "768": {
      "slidesPerView": 4
    },
    "1024": {
      "slidesPerView": 5
    }
  }'
    >
      <swiper-slide *ngFor="let client of clients">
        <div class="logo-wrapper">
          <img [src]="client.logo" [alt]="client.name" class="client-logo" />
        </div>
      </swiper-slide>
    </swiper-container>
  </div>
</section>

<div class="mx-auto">
  <div class="relative">
    <div class="h-px bg-[#163523]"></div>

    <div
      class="absolute left-1/2 -translate-x-1/2 -top-1 w-3 h-3 rounded-full bg-[#00ff66] shadow-[0_0_15px_#00ff66]"
    ></div>
  </div>
</div>
