<header class="absolute top-0 left-0 w-full z-50 pt-8">
  <div class="max-w-7xl mx-auto px-5 sm:px-6 lg:px-12">
    <div class="flex items-center justify-between">
      <!-- Logo -->
      <a routerLink="/" class="flex items-center gap-3">
        <img src="images/logo.png" alt="RQMMYAT" class="w-12 h-12 object-contain" />

        <h2 class="hidden md:block text-white text-3xl font-bold">RQMMYAT</h2>
      </a>

      <!-- Desktop Navigation -->
      <div class="hidden lg:flex items-center gap-5">
        <nav
          class="flex items-center gap-10 bg-[#032b16] border border-[#0d5c34] px-10 py-4 rounded-full"
        >
          <a
            routerLink="/"
            routerLinkActive="active-link"
            [routerLinkActiveOptions]="{ exact: true }"
            class="nav-link"
          >
            Home
          </a>

          <a routerLink="/about" routerLinkActive="active-link" class="nav-link"> About </a>

          <!-- Services Dropdown -->
          <div class="relative group">
            <a
              routerLink="/services"
              routerLinkActive="active-link"
              class="nav-link flex items-center gap-2"
            >
              Services

              <svg
                class="w-4 h-4 transition-transform duration-300 group-hover:rotate-180"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M19 9l-7 7-7-7"
                />
              </svg>
            </a>

            <!-- Dropdown -->
            <div
              class="absolute top-full left-0 mt-6 w-72 bg-[#032b16] border border-[#0d5c34] rounded-2xl opacity-0 invisible translate-y-3 group-hover:opacity-100 group-hover:visible group-hover:translate-y-0 transition-all duration-300 shadow-xl"
            >
              <div class="p-3 flex flex-col">
                <a
                  *ngFor="let service of services"
                  [routerLink]="['/services']"
                  [fragment]="service.slug"
                  class="dropdown-link"
                >
                  {{ service.title }}
                </a>
              </div>
            </div>
          </div>

          <a routerLink="/projects" routerLinkActive="active-link" class="nav-link"> Projects </a>

          <a routerLink="/contact" routerLinkActive="active-link" class="nav-link"> Contact </a>
        </nav>
      </div>

      <!-- Desktop Contact Button -->
      <a
        routerLink="/contact"
        class="hidden lg:block bg-[#00cc52] text-white font-semibold px-6 py-4 rounded-full transition-all duration-300 hover:scale-105 hover:bg-[#00e65c] shadow-lg shadow-green-500/20"
      >
        Contact Us
      </a>

      <!-- Mobile Button -->
      <button
        type="button"
        (click)="toggleMobileMenu()"
        class="lg:hidden flex items-center justify-center w-12 h-12 rounded-xl border border-[#0d5c34] bg-[#032b16] text-white hover:text-[#00ff66] hover:border-[#00ff66] transition-all duration-300"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="w-6 h-6"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 6h16M4 12h16M4 18h16"
          />
        </svg>
      </button>
    </div>

    <!-- Mobile Menu -->
    <div
      *ngIf="isMobileMenuOpen"
      class="lg:hidden mt-4 bg-[#032b16] border border-[#0d5c34] rounded-3xl overflow-hidden shadow-[0_0_25px_rgba(0,255,102,0.15)]"
    >
      <div class="flex flex-col p-4">
        <a
          routerLink="/"
          routerLinkActive="active-link"
          [routerLinkActiveOptions]="{ exact: true }"
          (click)="closeMobileMenu()"
          class="mobile-link"
        >
          Home
        </a>

        <a
          routerLink="/about"
          routerLinkActive="active-link"
          (click)="closeMobileMenu()"
          class="mobile-link"
        >
          About
        </a>

        <!-- Mobile Services -->
        <button
          (click)="showServices = !showServices"
          class="mobile-link flex items-center justify-between"
        >
          Services

          <svg
            class="w-4 h-4 transition-transform duration-300"
            [class.rotate-180]="showServices"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M19 9l-7 7-7-7"
            />
          </svg>
        </button>

        <div
          *ngIf="showServices"
          class="ml-4 mt-1 p-5 flex flex-col border border-[#0d5c34] rounded-xl"
        >
          <a
            *ngFor="let service of services"
            [routerLink]="['/services']"
            [fragment]="service.slug"
            (click)="closeMobileMenu()"
            class="py-2 text-gray-300 hover:text-[#00ff66] transition-all duration-300"
          >
            {{ service.title }}
          </a>
        </div>

        <a
          routerLink="/projects"
          routerLinkActive="active-link"
          (click)="closeMobileMenu()"
          class="mobile-link"
        >
          Projects
        </a>

        <a
          routerLink="/contact"
          routerLinkActive="active-link"
          (click)="closeMobileMenu()"
          class="mobile-link"
        >
          Contact
        </a>

        <!-- Mobile Contact Button -->
        <a
          routerLink="/contact"
          (click)="closeMobileMenu()"
          class="mt-4 w-full sm:w-64 mx-auto text-center bg-[#00cc52] text-white font-semibold py-3 rounded-xl transition-all duration-300 hover:bg-[#00e65c]"
        >
          Contact Us
        </a>
      </div>
    </div>
  </div>
</header>
