<section class="py-20 bg-[#07130d]">
  <div class="max-w-7xl mx-auto px-5 sm:px-6 lg:px-12">
    <div class="text-center mb-16">
      <span class="text-[#00ff66] uppercase tracking-widest text-sm font-semibold"> Our Team </span>

      <h2 class="text-white text-4xl md:text-5xl font-bold mt-4">Meet Our Experts</h2>

      <p class="text-gray-400 max-w-2xl mx-auto mt-6">
        A dedicated team of professionals passionate about creating innovative digital solutions and
        delivering exceptional results.
      </p>
    </div>

    <swiper-container
      #swiperRef
      loop="false"
      autoplay-delay="4000"
      autoplay-disable-on-interaction="false"
      navigation="false"
      pagination="false"
      space-between="30"
      slides-per-view="1"
      breakpoints='{
        "640": { "slidesPerView": 1 },
        "768": { "slidesPerView": 2 },
        "1024": { "slidesPerView": 3 }
      }'
    >
      <swiper-slide *ngFor="let member of members">
        <div
          class="team-card group bg-[#101b15] border border-[#163523] rounded-3xl overflow-hidden h-full transition-all duration-500"
        >
          <div class="overflow-hidden">
            <img
              [src]="member.image"
              [alt]="member.name"
              class="w-full h-80 object-cover group-hover:scale-105 transition-transform duration-700"
            />
          </div>

          <div class="p-6 flex flex-col h-[230px]">
            <h3 class="text-white text-2xl font-semibold mb-2">
              {{ member.name }}
            </h3>

            <span class="text-[#00ff66] font-medium mb-3">
              {{ member.position }}
            </span>

            <p class="text-gray-400 flex-grow">
              {{ member.quote }}
            </p>
          </div>
        </div>
      </swiper-slide>
    </swiper-container>

    <div class="flex justify-center gap-4 mt-10">
      <button class="custom-prev" (click)="prevSlide()">
        <i class="fa-solid fa-arrow-left"></i>
      </button>

      <button class="custom-next" (click)="nextSlide()">
        <i class="fa-solid fa-arrow-right"></i>
      </button>
    </div>
  </div>
</section>

<div class="mx-auto">
  <div class="relative">
    <div class="h-px bg-[#163523]"></div>

    <div
      class="absolute left-1/2 -translate-x-1/2 -top-1 w-3 h-3 rounded-full bg-[#00ff66] shadow-[0_0_15px_#00ff66]"
    ></div>
  </div>
</div>
